<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moodle Quiz Previewer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --correct: #10b981;
            --wrong: #ef4444;
            --accent: #f1f5f9;
            --border: #e2e8f0;
            --delete: #ef4444;
            --export: #8b5cf6;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            margin-bottom: 2rem;
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
        }

        h1 {
            color: var(--primary);
            margin: 0 0 0.5rem;
            font-size: 2rem;
        }

        #header-info {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Control Panel */
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        select,
        button,
        label.file-label,
        .action-bar input {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        select:hover,
        button:hover,
        label.file-label:hover {
            border-color: var(--primary);
            background: var(--accent);
        }

        button.primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        button.primary:hover {
            background: var(--primary-hover);
        }

        input[type="file"] {
            display: none;
        }

        /* Action Bar (Sticky or top fixed) */
        .action-bar {
            background: white;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            position: sticky;
            top: 0.5rem;
            z-index: 100;
            margin-bottom: 2rem;
            display: none;
            /* Shown when quiz is loaded */
            align-items: center;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        #loading {
            text-align: center;
            padding: 2rem;
            color: var(--primary);
            font-weight: 600;
        }

        .action-bar.visible {
            display: flex;
        }

        .action-bar input {
            min-width: 200px;
            cursor: text;
        }

        .btn-delete {
            color: var(--delete);
            border-color: var(--delete);
        }

        .btn-delete:hover {
            background: #fef2f2;
            border-color: var(--delete);
        }

        .btn-export {
            background: var(--export);
            color: white;
            border: none;
        }

        .btn-export:hover {
            opacity: 0.9;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        /* Category Quick Nav */
        .category-nav {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 2rem;
            padding: 1rem;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            display: none;
            /* Shown when quiz is loaded */
        }

        .category-nav.visible {
            display: flex;
        }

        .nav-item {
            padding: 0.5rem 1rem;
            background: var(--accent);
            color: var(--text);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-item:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .nav-count {
            background: rgba(0, 0, 0, 0.1);
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .nav-item:hover .nav-count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Question Rendering Styles */
        .category-title {
            background: var(--primary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            margin: 2.5rem 0 1.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            display: inline-block;
        }

        .question-card {
            background: var(--card);
            border-radius: 16px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.04);
            border: 1px solid var(--border);
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            /* Performance & Stability Optimization */
            contain: content;
            min-height: 200px;
        }

        .btn-refresh {
            background: #64748b;
            color: white;
            border: none;
        }

        .btn-refresh:hover {
            background: #475569;
        }

        .question-card:has(.q-selector:checked) {
            border-color: var(--primary);
            background: #fdfdff;
        }

        .q-selector {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            width: 1.5rem;
            height: 1.5rem;
            cursor: pointer;
        }

        .q-name {
            font-weight: 700;
            color: var(--primary);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding-left: 2rem;
        }

        .q-text {
            margin-bottom: 2rem;
            font-size: 1.15rem;
            color: #0f172a;
        }

        .options {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            padding: 1rem 1.25rem;
            border: 2px solid var(--accent);
            border-radius: 12px;
            transition: all 0.2s;
            position: relative;
            background: #fafafa;
        }

        .option.correct {
            border-color: var(--correct);
            background-color: #f0fdf4;
            color: #166534;
        }

        .option.correct::after {
            content: "✓ 正確答案";
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--correct);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .feedback {
            font-size: 0.9rem;
            color: #475569;
            margin-top: 1rem;
            padding: 1rem;
            background: #f1f5f9;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .error {
            background: #fef2f2;
            color: var(--wrong);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid #fee2e2;
            text-align: center;
            margin: 2rem 0;
        }

        code,
        pre {
            background: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9em;
        }

        pre {
            display: block;
            padding: 1.25rem;
            margin: 1.5rem 0;
            overflow-x: auto;
            border: 1px solid var(--border);
        }

        /* Empty State */
        #empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 800px) {
            .container {
                padding: 1rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .question-card {
                padding: 1.5rem;
            }

            .action-bar {
                border-radius: 0;
                top: 0;
                margin-left: -1rem;
                margin-right: -1rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Moodle Quiz Previewer</h1>
            <p id="header-info">請選擇或開啟一個 Moodle XML 試題檔案</p>

            <div class="controls">
                <select id="fileDropdown">
                    <option value="">-- 選擇目錄下的試題 --</option>
                    <option value="moodle_xml/ch01_quiz.xml">ch01_quiz.xml</option>
                    <option value="moodle_xml/ch02_quiz.xml">ch02_quiz.xml</option>
                    <option value="moodle_xml/ch04_quiz.xml">ch04_quiz.xml</option>
                    <option value="moodle_xml/ch04_quiz_new.xml">ch04_quiz_new.xml</option>
                    <option value="moodle_xml/ch05.xml">ch05.xml</option>
                </select>

                <label for="fileInput" class="file-label">
                    📂 打開本地檔案...
                    <input type="file" id="fileInput" accept=".xml">
                </label>
            </div>
        </header>

        <!-- Edit/Export Toolbar -->
        <div class="action-bar" id="actionBar">
            <input type="text" id="exportFilename" placeholder="新試題檔名.xml">
            <button onclick="viewer.exportXML(true)" class="btn-export">📤 匯出勾選項</button>
            <button onclick="viewer.exportXML(false)" class="btn-save" title="移除勾選題並另存新檔">💾 匯出剩餘項</button>
            <button onclick="viewer.deleteSelected()" class="btn-delete">🗑️ 從預覽刪除</button>
            <button onclick="viewer.refresh()" class="btn-refresh" title="遇到顯示問題時重新讀取內容">🔄 重整視圖</button>
        </div>

        <nav class="category-nav" id="categoryNav"></nav>

        <main id="quiz-container">
            <div id="empty-state">
                <p>💡 提示：從上方下拉選單選擇試題，或點擊「打開本地檔案」載入進行瀏覽與編輯。</p>
            </div>
        </main>
    </div>

    <script src="preview_js.js"></script>
    <script>
        // Initialize the viewer
        const viewer = new MoodleQuizViewer('quiz-container');

        const actionBar = document.getElementById('actionBar');

        // Handle Dropdown Selection
        document.getElementById('fileDropdown').addEventListener('change', (e) => {
            const url = e.target.value;
            if (url) {
                viewer.loadFromURL(url).then(() => {
                    actionBar.classList.add('visible');
                });
            }
        });

        // Handle File Input
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                viewer.loadFromFile(file);
                actionBar.classList.add('visible');
                // Clear dropdown
                document.getElementById('fileDropdown').value = "";
            }
        });
    </script>
</body>

</html>
